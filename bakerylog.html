<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bakery Log • Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="/home.html">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/features.html">Features</a>
      <a href="/bakerylog.html">Bakery Log</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Fresh Batch
    </div>

  </div>
</div>

<section class="hero">
  <h1>Bakery Log</h1>
  <p class="subtitle">fresh updates straight from the oven</p>
</section>

<section class="log-container" id="logContainer">
</section>

<script>
async function loadLog() {
  try {
    const res = await fetch("/api/bakerylog");
    const logs = await res.json();

    const container = document.getElementById("logContainer");
    container.innerHTML = "";

    logs.forEach(log => {
      const card = document.createElement("div");
      card.className = "log-card";

      const time = new Date(log.time).toLocaleTimeString();

      card.innerHTML = `
        <h2>${log.title}</h2>
        <p>${log.text}</p>
        <small>${time}</small>
      `;

      container.appendChild(card);
    });

  } catch (err) {
    console.log(err);
  }
}

loadLog();
setInterval(loadLog, 10000);
</script>

<footer>
  Willow Wisk • Baking new features daily
</footer>

</body>
</html>
