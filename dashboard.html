<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard • Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="/home.html">Home</a>
      <a href="/bakerylog.html">Bakery Log</a>
      <a href="/status.html">Status</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Dashboard
    </div>

  </div>
</div>

<!-- ONLY ONE HEADER -->
<section class="dashboard-header">
  <h1>Dashboard</h1>
  <p class="subtitle">Select a server to manage your bot</p>
</section>

<!-- SERVER GRID -->
<section class="server-grid" id="serverGrid"></section>

<script>
async function loadGuilds() {
  const res = await fetch("/api/guilds");
  const guilds = await res.json();
  console.log(guilds);

  const grid = document.getElementById("serverGrid");
  grid.innerHTML = "";

  guilds.forEach(g => {
    const card = document.createElement("div");
    card.className = "server-card";

    card.innerHTML = `
  <div class="server-top">
    <img src="${g.icon || 'https://via.placeholder.com/48'}" class="server-icon" />
    <div>
      <div class="server-name">${g.name}</div>
      <div class="server-members">${g.members || 0} members</div>
    </div>
  </div>

  <button class="manage-btn">Open Dashboard →</button>
`;

card.querySelector(".manage-btn").onclick = () => {
  localStorage.setItem("selectedGuild", g.id);
  window.location.href = "/server.html";
};

    grid.appendChild(card);
  });
}

loadGuilds();
</script>

</body>
</html>
