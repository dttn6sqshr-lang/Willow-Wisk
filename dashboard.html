<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard • Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="/home.html">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/features.html">Features</a>
    </div>

    <div class="status" id="botStatus">
  <span class="dot" id="statusDot"></span>
  <span id="statusText">Checking...</span>
</div>

  </div>
</div>

<section class="hero">
  <h1>Select a Server</h1>
  <p class="subtitle">choose a server to manage Willow Wisk</p>
</section>

<section class="server-grid" id="serverGrid">
</section>

<script>
async function loadGuilds() {
  try {
    const res = await fetch("/api/guilds");

    if (!res.ok) {
      throw new Error("Guild API failed");
    }

    const guilds = await res.json();

    const grid = document.getElementById("serverGrid");
    grid.innerHTML = "";

    guilds.forEach(g => {
      const card = document.createElement("div");
      card.className = "server-card";

      card.innerHTML = `
        <div style="font-weight:bold">${g.name}</div>
        <div style="opacity:0.6;font-size:12px">${g.members ?? 0} members</div>
      `;

      card.onclick = () => {
        alert("Selected: " + g.name);
      };

      grid.appendChild(card);
    });

  } catch (err) {
    document.getElementById("serverGrid").innerHTML =
      "<p>Failed loading servers.</p>";

    console.log(err);
  }
}

loadGuilds();
</script>

<script>
async function loadStatus() {
  try {
    const res = await fetch("/api/stats");
    const data = await res.json();

    const dot = document.getElementById("statusDot");
    const text = document.getElementById("statusText");

    if (!data || !data.servers) {
      dot.style.background = "red";
      text.innerText = "Offline";
      return;
    }

    dot.style.background = "#4ade80";
    text.innerText = "Online";

  } catch (e) {
    document.getElementById("statusDot").style.background = "red";
    document.getElementById("statusText").innerText = "Offline";
  }
}

loadStatus();
setInterval(loadStatus, 15000);
</script>

</body>
</html>
