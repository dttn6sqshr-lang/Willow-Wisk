<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard • Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="/home.html">Home</a>
      <a href="/bakerylog.html">Bakery Log</a>
      <a href="/status.html">Status</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Dashboard
    </div>

  </div>
</div>

<!-- ONLY ONE HEADER -->
<section class="dashboard-header">
  <h1>Dashboard</h1>
  <p class="subtitle">Select a server to manage your bot</p>
</section>

<!-- SERVER GRID -->
<section class="server-grid" id="serverGrid"></section>

<script>
async function loadGuilds() {
  const res = await fetch("/api/guilds");
  const guilds = await res.json();

  const grid = document.getElementById("serverGrid");
  grid.innerHTML = "";

  guilds.forEach(g => {
    const card = document.createElement("div");
    card.className = "server-card";

    card.innerHTML = `
      <div style="font-weight:600">${g.name}</div>
      <div style="opacity:0.6;font-size:12px">${g.members || 0} members</div>
    `;

    card.onclick = () => {
      localStorage.setItem("selectedGuild", g.id);
      window.location.href = "/server.html";
    };

    grid.appendChild(card);
  });
}

loadGuilds();
</script>

</body>
</html>
