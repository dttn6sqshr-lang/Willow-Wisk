<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="features.html">Features</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="bakerylog.html">Bakery Log</a>
      <a href="#">Status</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Online
    </div>

    <div class="actions" id="authButtons">
  <a href="/auth/discord">Login</a>
  <a class="btn" href="#">Invite</a>
</div>

  </div>
</div>

<!-- HERO -->
<section class="hero">

  <div class="cupcake">🧁</div>

  <h1>Willow Wisk</h1>

  <p class="subtitle">
    a bakery-themed Discord automation system
  </p>

  <div class="cta">
    <a href="/auth/discord" class="btn">Login with Discord</a>
    <a href="/dashboard" class="btn ghost">Open Dashboard</a>
  </div>

</section>

<section class="stats">

  <div class="stat-card">
    <h2 id="servers">0</h2>
    <p>Servers</p>
  </div>

  <div class="stat-card">
    <h2 id="users">0</h2>
    <p>Users</p>
  </div>

  <div class="stat-card">
    <h2 id="uptime">0h</h2>
    <p>Uptime</p>
  </div>

</section>

<footer>
  Willow Wisk • v1.0.0
</footer>

<script>
async function loadStats() {
  try {
    const res = await fetch("/api/stats");
    const data = await res.json();

    animateNumber("servers", data.servers);
    animateNumber("users", data.users);

    const uptimeSec = Math.floor((Date.now() - data.uptime) / 1000);
    const hours = Math.floor(uptimeSec / 3600);

    document.getElementById("uptime").innerText = hours + "h";

  } catch (e) {
    console.log(e);
  }
}

function animateNumber(id, target) {
  let el = document.getElementById(id);
  let current = 0;
  let step = Math.ceil(target / 40);

  let interval = setInterval(() => {
    current += step;
    if (current >= target) {
      current = target;
      clearInterval(interval);
    }
    el.innerText = current.toLocaleString();
  }, 20);
}

loadStats();
setInterval(loadStats, 30000);
</script>

<script>
async function checkLogin() {
  const res = await fetch("/api/session");
  const data = await res.json();

  if (data.loggedIn) {
    document.getElementById("authButtons").innerHTML =
      '<a href="/dashboard">Dashboard</a>';
  }
}

checkLogin();
</script>

</body>
</html>
