<!DOCTYPE html>
<html>
<head>
  <title>Willow Wisk</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg,#F7F2EA,#A8BFA3,#7C9D96);
      color: #4b3b2f;
    }

    .card {
      width: 650px;
      height: 480px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px;
      border-radius: 30px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      position: relative;
    }

    /* TOP BRAND */
    .title {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .cupcake {
      font-size: 50px;
      animation: float 3s ease-in-out infinite;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
      margin-top: 2px;
    }

    .subtitle {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* SIDE COLUMNS */
    .side {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 140px;
    }

    /* CENTER AREA */
    .center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      top: 140px;
    }

    .bowl {
      font-size: 50px; /* SMALLER BOWL */
      animation: float 3s ease-in-out infinite;
      opacity: 0.95;
    }

    /* BUTTONS */
    .btn {
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: #7C9D96;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 13px;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #6f8f89;
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- BRAND -->
    <div class="title">
      <div class="cupcake">🧁</div>
      <div class="name">Willow Wisk</div>
      <div class="subtitle">Willow & Wisk Café</div>
    </div>

    <!-- LEFT -->
    <div class="side">
      <button class="btn">Status</button>
      <button class="btn">Activity</button>
    </div>

    <!-- CENTER BOWL (SMALLER + UNDER TITLE) -->
    <div class="center">
      <div class="bowl">🥣</div>
    </div>

    <!-- RIGHT -->
    <div class="side">
      <button class="btn">Login</button>
      <button class="btn">Add to Discord</button>
    </div>

  </div>

</body>
</html>
