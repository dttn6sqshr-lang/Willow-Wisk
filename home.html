<!DOCTYPE html>
<html>
<head>
  <title>Willow Wisk</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg,#F7F2EA,#A8BFA3,#7C9D96);
      color: #4b3b2f;
    }

    .card {
      width: 520px;
      padding: 50px;
      border-radius: 30px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(15px);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    }

    .title {
      font-size: 38px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    /* TOP ROW */
    .top-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    /* BOWL */
    .bowl {
      font-size: 70px;
      margin: 25px 0;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* BOTTOM ROW */
    .bottom-row {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      margin: 5px;
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: #7C9D96;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #6f8f89;
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="title">🧁 Willow Wisk</div>

    <!-- TOP: Status + Login -->
    <div class="top-row">
      <button class="btn">Status</button>
      <button class="btn">Login</button>
    </div>

    <!-- MIDDLE BOWL -->
    <div class="bowl">🥣</div>

    <!-- BOTTOM: Activity + Add -->
    <div class="bottom-row">
      <button class="btn">Activity</button>
      <button class="btn">Add to Discord</button>
    </div>

  </div>

</body>
</html>
