<!DOCTYPE html>
<html>
<head>
<title>Willow Wisk</title>

<style>
/* ===== PAGE ===== */

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  overflow:hidden;

  background: linear-gradient(
    135deg,
    #FAF4EC,
    #F2E5D7,
    #E8D2BD
  );
}

/* flour particles */

body::before{
  content:"";
  position:fixed;
  inset:0;

  background-image:
    radial-gradient(white 1px, transparent 1px);

  background-size:40px 40px;
  opacity:.10;
  animation: drift 28s linear infinite;
}

@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

/* ===== MAIN CARD ===== */

.card{
  width:760px;
  padding:38px;

  background: rgba(255,249,242,.82);
  backdrop-filter: blur(10px);

  border:1px solid rgba(255,255,255,.45);

  border-radius:24px;

  box-shadow:
    0 20px 50px rgba(0,0,0,.08);

  text-align:center;
  position:relative;
  z-index:2;
}

/* ===== CUPCAKE ===== */

.cupcake{
  font-size:54px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* ===== TITLE ===== */

.title{
  margin-top:6px;
  font-size:32px;
  font-weight:bold;
  color:#5B4332;
}

.subtitle{
  margin-top:4px;
  margin-bottom:28px;

  font-size:14px;
  color:#7A6554;
}

/* ===== BUTTON GRID ===== */

.row{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-bottom:20px;
}

.btn{
  width:180px;
  padding:15px;

  border:none;
  border-radius:14px;

  background:#FFFDF9;
  border:2px solid #E8D8C6;

  cursor:pointer;

  font-size:14px;
  color:#5B4332;

  transition:.25s;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 20px rgba(0,0,0,.08);
}

/* ===== BOWL ===== */

.centerpiece{
  margin:18px 0;
}

.steam{
  font-size:18px;
  opacity:.65;
  animation: steam 2.5s ease-in-out infinite;
}

@keyframes steam{
  0%{transform:translateY(0);opacity:.3;}
  50%{transform:translateY(-6px);opacity:.9;}
  100%{transform:translateY(0);opacity:.3;}
}

.bowl{
  font-size:52px;
}

/* ===== ABOUT ===== */

.line{
  height:1px;
  background:#E6D4C3;
  margin:28px 0 20px 0;
}

.about-title{
  font-size:18px;
  font-weight:bold;
  color:#5B4332;
}

.about{
  margin-top:10px;
  line-height:1.6;
  font-size:14px;
  color:#6E5948;
}

.footer{
  margin-top:20px;
  font-size:13px;
  color:#8A7666;
}

/* mobile */

@media(max-width:800px){

.card{
  width:90%;
  padding:24px;
}

.row{
  flex-direction:column;
  align-items:center;
}

.btn{
  width:100%;
}
}
</style>
</head>

<body>

<div class="card">

  <div class="cupcake">🧁</div>

  <div class="title">Willow Wisk</div>
  <div class="subtitle">Willow & Wisk Café</div>

  <div class="row">
    <button class="btn">Status</button>
    <button class="btn">Activity</button>
  </div>

  <div class="centerpiece">
    <div class="steam">♨️</div>
    <div class="bowl">🥣</div>
  </div>

  <div class="row">
    <button class="btn">Login</button>
    <button class="btn">Add Discord</button>
  </div>

  <div class="line"></div>

  <div class="about-title">
    About Willow Wisk
  </div>

  <div class="about">
    Willow Wisk is a bakery-themed Discord bot built
    for tickets, partnerships, automation, moderation,
    staff systems and complete server management.
  </div>

  <div class="footer">
    bakery powered ✨
  </div>

</div>

</body>
</html>
