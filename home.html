<!DOCTYPE html>
<html>
<head>
<title>Willow Wisk</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  flex-direction: column;

  background: linear-gradient(
    135deg,
    #F7F0E6,
    #F0E1D2,
    #EAD7C3
  );
}

/* TOP BAR */

.topbar {
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 0 20px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);

  color: #4B3B2F;
  font-weight: bold;
}

.topbar .nav {
  display: flex;
  gap: 14px;
  font-weight: normal;
}

/* MAIN LAYOUT */

.container {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* SIDEBAR */

.sidebar {
  width: 220px;

  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);

  padding: 20px;

  display: flex;
  flex-direction: column;
  gap: 14px;

  color: #4B3B2F;
}

/* MAIN CONTENT */

.main {
  flex: 1;
  padding: 20px;

  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

/* CARD */

.card {
  background: rgba(255,255,255,0.7);
  border-radius: 16px;

  padding: 16px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.08);

  min-height: 120px;
}

/* SIDEBAR ITEMS */

.sidebar-item {
  padding: 10px;
  border-radius: 10px;

  background: rgba(255,255,255,0.4);

  cursor: pointer;
  transition: 0.2s;
}

.sidebar-item:hover {
  background: rgba(255,255,255,0.7);
  transform: translateX(3px);
}

/* SMALL TITLE */

.logo {
  font-size: 18px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">🧁 Willow Wisk</div>

  <div class="nav">
    <div>Status</div>
    <div>Activity</div>
    <div>Login</div>
  </div>
</div>

<!-- BODY -->
<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-item">Status</div>
    <div class="sidebar-item">Activity</div>
    <div class="sidebar-item">Servers</div>
    <div class="sidebar-item">Tickets</div>
    <div class="sidebar-item">Partnerships</div>
    <div class="sidebar-item">Settings</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="card">Overview Card</div>
    <div class="card">Stats Card</div>
    <div class="card">Live Activity</div>
    <div class="card">Quick Actions</div>

  </div>

</div>

</body>
</html>
