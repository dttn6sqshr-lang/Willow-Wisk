<!DOCTYPE html>
<html>
<head>
<title>Willow Wisk</title>

<style>
/* PAGE */

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  font-family: Arial;
  color: #4b3b2f;

  /* wood wall texture */
  background:
    linear-gradient(90deg, #7a5538 0%, #8a6242 25%, #6f4c32 50%, #8a6242 75%, #7a5538 100%);
}

/* flour particles */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
  radial-gradient(white 1px, transparent 1px);

  background-size:40px 40px;
  opacity:.14;
  animation: drift 30s linear infinite;
}

@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

/* MAIN CARD */

.card {
  width: 760px;
  height: 460px;

  background: #fff8ef;

  border-radius: 18px;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.35);

  padding: 25px;

  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* cupcake */

.cupcake{
  font-size:58px;
  margin-bottom:8px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* hanging sign */

.sign {
  text-align: center;
  margin-bottom: 10px;
}

.title {
  font-size: 26px;
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  opacity: 0.7;
}

/* settings */

.settings{
  margin-bottom:22px;
  font-size:14px;
  cursor:pointer;
}

/* shelf */

.shelf {
  position: fixed;
  left: 0;
  width: 100%;
  height: 28px;
  background: #4e3423;
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.4);
}

.top-shelf {
  top: 70px;
}

.bottom-shelf {
  bottom: 70px;
}

.frame {
  width: 820px;
  height: 520px;

  padding: 30px;

  background: #2f1e14;
  border-radius: 26px;

  box-shadow:
    inset 0 0 0 6px #5a3a26,
    inset 0 0 40px rgba(0,0,0,0.6);

  display: flex;
  justify-content: center;
  align-items: center;
}

/* shelf title */

.shelf-title{
  font-size:15px;
  font-weight:bold;
  margin-bottom:20px;
}

/* layout */

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  align-items:center;
}

/* recipe cards */

.btn{
  padding:16px;
  background:#FFFDF8;
  border:2px dashed #C9B39A;
  border-radius:14px;

  color:#5B4332;
  cursor:pointer;

  font-size:14px;

  transition:.25s;
}

.btn:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}

/* bowl */

.bowl{
  font-size:50px;
  grid-column:span 2;
  margin:5px 0;
  animation: float 3s ease-in-out infinite;
}

/* footer */

.footer{
  margin-top:18px;
  font-size:12px;
  opacity:.7;
}

</style>
</head>

<body>

<div class="card">

  <div class="cupcake">🧁</div>

  <div class="sign">
    <div class="title">Willow Wisk</div>
    <div class="subtitle">Willow & Wisk Café</div>
  </div>

  <div class="settings">📖 Settings</div>

  <div class="shelf top-shelf"></div>

<div class="frame">
  <div class="card">

    <div class="sign">
      <div class="title">Willow Wisk</div>
      <div class="subtitle">Willow & Wisk Café</div>
    </div>

    <div class="grid">
      <button>Status</button>
      <button>Login</button>
      <div class="bowl">🥣</div>
      <button>Activity</button>
      <button>Add Discord</button>
    </div>

  </div>
</div>

<div class="shelf bottom-shelf"></div>
  </div>

</div>

<script>
function loginDiscord(){
  window.open("/auth/discord");
}

/* temporary */
function loadStatus(){
  alert("status page next");
}
</script>

</body>
</html>
