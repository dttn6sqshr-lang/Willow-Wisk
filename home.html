<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="features.html">Features</a>
      <a href="#">Dashboard</a>
      <a href="#">Bakery Log</a>
      <a href="#">Status</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Online
    </div>

    <div class="actions">
      <a class="btn ghost" href="/auth/discord">Login</a>
      <a class="btn" href="#">Invite</a>
    </div>

  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="cupcake">🧁</div>
  <h1>Willow Wisk</h1>
  <p class="subtitle">freshly baked systems for your server</p>

  <div class="pills">
    <div>Tickets</div>
    <div>Moderation</div>
    <div>Verification</div>
    <div>Partnerships</div>
  </div>
</section>

<!-- STATS ONLY (NO OTHER SECTIONS) -->
<section class="stats">

  <div class="stat">
    <h2 id="servers">0</h2>
    <p>Servers</p>
  </div>

  <div class="stat">
    <h2 id="users">0</h2>
    <p>Users</p>
  </div>

  <div class="stat">
    <h2 id="uptime">0h</h2>
    <p>Uptime</p>
  </div>

</section>

<footer>
  Willow Wisk • v1.0.0
</footer>

<script>
async function loadStats() {
  try {
    const res = await fetch("/api/stats");
    const data = await res.json();

    document.getElementById("servers").innerText = data.servers + "+";
    document.getElementById("users").innerText = data.users.toLocaleString();

    const uptimeSec = Math.floor((Date.now() - data.uptime) / 1000);
    const hours = Math.floor(uptimeSec / 3600);

    document.getElementById("uptime").innerText = hours + "h";

  } catch (e) {
    console.log("Stats error", e);
  }
}

loadStats();
setInterval(loadStats, 30000);
</script>

</body>
</html>
