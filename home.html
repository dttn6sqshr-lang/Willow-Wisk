<!DOCTYPE html>
<html>
<head>
  <title>Willow Wisk</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg,#F7F2EA,#A8BFA3,#7C9D96);
      color: #4b3b2f;
    }

    .card {
      width: 650px;
      height: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px;
      border-radius: 30px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    }

    /* LEFT + RIGHT COLUMNS */
    .col {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 150px;
    }

    /* CENTER */
    .center {
      text-align: center;
      flex: 1;
    }

    .bowl {
      font-size: 60px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* BUTTONS */
    .btn {
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: #7C9D96;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 13px;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #6f8f89;
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- LEFT COLUMN -->
    <div class="col">
      <button class="btn">Status</button>
      <button class="btn">Activity</button>
    </div>

    <!-- CENTER BOWL -->
    <div class="center">
      <div class="bowl">🥣</div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="col">
      <button class="btn">Login</button>
      <button class="btn">Add to Discord</button>
    </div>

  </div>

</body>
</html>
