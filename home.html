<!DOCTYPE html>
<html>
<head>
<title>Willow Wisk</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  overflow:hidden;
  background: linear-gradient(135deg,#FAF4EC,#F2E5D7,#E8D2BD);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size:40px 40px;
  opacity:.10;
  animation: drift 28s linear infinite;
}

@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

.card{
  width:760px;
  padding:38px;
  background: rgba(255,249,242,.82);
  backdrop-filter: blur(10px);
  border-radius:24px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.cupcake{font-size:54px;}
.title{font-size:32px;font-weight:bold;color:#5B4332;}
.subtitle{font-size:14px;color:#7A6554;margin-bottom:20px;}

.row{display:flex;justify-content:center;gap:16px;margin:10px 0;}

.btn{
  width:170px;
  padding:14px;
  border-radius:14px;
  border:2px solid #E8D8C6;
  background:#FFFDF9;
  cursor:pointer;
}

.bowl-circle{
  width:90px;
  height:90px;
  margin:18px auto;
  border-radius:50%;
  background:white;
  border:2px solid #E8D8C6;
  display:flex;
  align-items:center;
  justify-content:center;
}

.about{font-size:13px;color:#6E5948;max-width:520px;margin:auto;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  display:none;
  justify-content:center;
  align-items:center;
}

.window{
  width:340px;
  background:white;
  padding:18px;
  border-radius:18px;
}

</style>
</head>

<body>

<div class="card">

  <div class="cupcake">🧁</div>
  <div class="title">Willow Wisk</div>
  <div class="subtitle">Willow & Wisk Café</div>

  <div class="row">
    <button class="btn" onclick="openWindow('status')">Status</button>
    <button class="btn" onclick="openWindow('activity')">Activity</button>
  </div>

  <div class="bowl-circle">🥣</div>

  <div class="row">
    <button class="btn" onclick="login()">Login</button>
    <button class="btn">Add Discord</button>
  </div>

  <div class="about">
    Bakery-themed Discord bot for tickets, partnerships, moderation and more.
  </div>

</div>

<div id="overlay" class="overlay" onclick="closeWindow(event)">
  <div id="window" class="window"></div>
</div>

<script>

async function openWindow(type){
  document.getElementById("overlay").style.display="flex";
  const box = document.getElementById("window");

  if(type==="status"){
    const res = await fetch("/api/status");
    const d = await res.json();

    box.innerHTML =
      "STATUS<br><br>" +
      "Online: " + d.online + "<br>" +
      "Ping: " + d.ping + "<br>" +
      "Servers: " + d.servers + "<br>" +
      "Users: " + d.users;
  }

  if(type==="activity"){
    const res = await fetch("/api/activity");
    const d = await res.json();

    box.innerHTML = "ACTIVITY<br><br>" +
      d.map(x => "• " + x.text).join("<br>");
  }
}

function closeWindow(e){
  if(e.target.id==="overlay"){
    document.getElementById("overlay").style.display="none";
  }
}

function login(){
  window.location.href="/auth/discord";
}

</script>

</body>
</html>
