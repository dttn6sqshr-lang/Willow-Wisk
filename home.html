<!DOCTYPE html>
<html>
<head>
  <title>Willow Wisk</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg,#F7F2EA,#A8BFA3,#7C9D96);
      color: #4b3b2f;
    }

    /* MAIN CARD */
    .card {
      width: 720px;
      height: 520px;
      position: relative;
      overflow: hidden;
      padding: 30px;
      border-radius: 30px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    /* HEADER */
    .cupcake {
      font-size: 52px;
      animation: float 3s ease-in-out infinite;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-top: 2px;
    }

    .subtitle {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    /* MIDDLE LAYOUT */
    .middle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex: 1;
      margin: 10px 0;
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 140px;
    }

    .center {
      flex: 1;
      text-align: center;
    }

    .bowl {
      font-size: 55px;
      animation: float 3s ease-in-out infinite;
    }

    /* BUTTONS */
    .btn {
      padding: 12px;
      border-radius: 14px;
      border: none;
      background: #7C9D96;
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    /* B (hover bakery feel) */
    .btn:hover {
      transform: translateY(-3px) scale(1.04);
      background: #6f8f89;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .btn:active {
      transform: scale(0.98);
    }

    /* FLOAT ANIMATION */
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

  </style>
</head>

<body>

  <div class="card" id="dashboardCard">

    <!-- HEADER -->
    <div>
      <div class="cupcake">🧁</div>
      <div class="title">Willow Wisk</div>
      <div class="subtitle">Willow & Wisk Café</div>
    </div>

    <!-- MIDDLE -->
    <div class="middle">

      <!-- LEFT -->
      <div class="col">
        <button class="btn" onclick="loadStatus()">Status</button>
        <button class="btn" onclick="location.href='/activity'">Activity</button>
      </div>

      <!-- CENTER -->
      <div class="center">
        <div class="bowl">🥣</div>
      </div>

      <!-- RIGHT -->
      <div class="col">
        <button class="btn" onclick="login()">Login</button>
        <button class="btn">Add Discord</button>
      </div>

    </div>

  </div>

  <script>
    function login() {
      window.open("/auth/discord", "login", "width=500,height=700");
    }
    
    async function loadStatus() {
  try {
    const res = await fetch("/api/status");
    const data = await res.json();
    showStatusPopup(data);
  } catch (err) {
    console.log("Status failed", err);
    alert("Status not available");
  }
}

function showStatusPopup(data) {
  const overlay = document.createElement("div");

  overlay.className = "status-overlay";

  overlay.innerHTML = `
    <div class="status-card">

      <div class="status-title">🧁 Bot Status</div>

      <div class="status-item">Ready: <b>${data.ready}</b></div>
      <div class="status-item">Name: <b>${data.botName}</b></div>
      <div class="status-item">Servers: <b>${data.guilds}</b></div>
      <div class="status-item">Ping: <b>${data.ping}ms</b></div>

      <button class="close-btn" onclick="this.closest('.status-overlay').remove()">
        Close
      </button>

    </div>
  `;

  document
  .getElementById("dashboardCard")
  .appendChild(overlay);
}

.status-overlay {
  position: absolute;
  inset: 0;
  border-radius: 30px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 100;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.status-card {
  width: 300px;
  padding: 22px;
  border-radius: 20px;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(18px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  text-align: center;
  animation: pop 0.25s ease;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.status-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}

.status-item {
  font-size: 13px;
  margin: 6px 0;
}

.close-btn {
  margin-top: 12px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #7C9D96;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.close-btn:hover {
  transform: scale(1.03);
  background: #6f8f89;
}

  </script>

</body>
</html>
