<!DOCTYPE html>
<html>
<head>
  <title>Willow Wisk</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg,#F7F2EA,#A8BFA3,#7C9D96);
      color: #4b3b2f;
    }

    .wrapper {
      text-align: center;
    }

    /* HEADER */
    .header {
      margin-bottom: 15px;
    }

    .cupcake {
      font-size: 52px;
      animation: float 3s ease-in-out infinite;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-top: 2px;
    }

    .subtitle {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* CARD */
    .card {
      width: 620px;
      height: 380px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px;
      border-radius: 30px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    }

    /* COLUMNS (LESS SPACING FIX) */
    .col {
      display: flex;
      flex-direction: column;
      gap: 10px; /* tighter spacing */
      width: 140px;
    }

    /* CENTER */
    .center {
      flex: 1;
      text-align: center;
    }

    .bowl {
      font-size: 55px;
      animation: float 3s ease-in-out infinite;
    }

    /* BUTTONS (smaller + tighter feel) */
    .btn {
      padding: 12px;
      border-radius: 14px;
      border: none;
      background: #7C9D96;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 12px;
    }

    .btn:hover {
      transform: scale(1.04);
      background: #6f8f89;
    }

  </style>
</head>

<body>

  <div class="wrapper">

    <!-- HEADER -->
    <div class="header">
      <div class="cupcake">🧁</div>
      <div class="title">Willow Wisk</div>
      <div class="subtitle">Willow & Wisk Café</div>
    </div>

    <!-- CARD -->
    <div class="card">

      <!-- LEFT -->
      <div class="col">
        <button class="btn">Status</button>
        <button class="btn">Activity</button>
      </div>

      <!-- CENTER -->
      <div class="center">
        <div class="bowl">🥣</div>
      </div>

      <!-- RIGHT -->
      <div class="col">
        <button class="btn">Login</button>
        <button class="btn">Add Discord</button>
      </div>

    </div>

  </div>

</body>
</html>
