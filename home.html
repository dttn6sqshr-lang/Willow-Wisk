<!DOCTYPE html>
<html>
<head>
<title>Willow Wisk</title>

<style>
/* PAGE */

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  overflow:hidden;

  /* bakery wall */
  background:
  linear-gradient(
    to bottom,
    #F7F0E6 0%,
    #F7F0E6 68%,
    #D8B89B 68%,
    #D8B89B 100%
  );

  color:#5B4332;
}

/* flour particles */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
  radial-gradient(white 1px, transparent 1px);

  background-size:40px 40px;
  opacity:.14;
  animation: drift 30s linear infinite;
}

@keyframes drift{
  from{transform:translateY(0);}
  to{transform:translateY(-300px);}
}

/* MAIN CARD */

.card{
  width:760px;
  padding:35px;
  border-radius:24px;

  background:#FFF8EF;

  border-top:8px solid #9B7E67;
  border-bottom:8px solid #9B7E67;

  box-shadow:0 18px 40px rgba(0,0,0,.08);

  text-align:center;
  position:relative;
  z-index:2;
}

/* cupcake */

.cupcake{
  font-size:58px;
  margin-bottom:8px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* hanging sign */

.sign{
  display:inline-block;
  background:#FFFDF9;
  border:3px solid #C7A98D;
  border-radius:14px;
  padding:12px 28px;
  margin-bottom:14px;

  box-shadow:0 5px 12px rgba(0,0,0,.06);
}

.title{
  font-size:26px;
  font-weight:bold;
}

.subtitle{
  font-size:12px;
  opacity:.7;
  margin-top:3px;
}

/* settings */

.settings{
  margin-bottom:22px;
  font-size:14px;
  cursor:pointer;
}

/* shelf */

.shelf{
  background:#FAF3EA;
  border:2px solid #D9B79B;
  border-radius:18px;
  padding:25px;
}

/* shelf title */

.shelf-title{
  font-size:15px;
  font-weight:bold;
  margin-bottom:20px;
}

/* layout */

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  align-items:center;
}

/* recipe cards */

.btn{
  padding:16px;
  background:#FFFDF8;
  border:2px dashed #C9B39A;
  border-radius:14px;

  color:#5B4332;
  cursor:pointer;

  font-size:14px;

  transition:.25s;
}

.btn:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}

/* bowl */

.bowl{
  font-size:50px;
  grid-column:span 2;
  margin:5px 0;
  animation: float 3s ease-in-out infinite;
}

/* footer */

.footer{
  margin-top:18px;
  font-size:12px;
  opacity:.7;
}

</style>
</head>

<body>

<div class="card">

  <div class="cupcake">🧁</div>

  <div class="sign">
    <div class="title">Willow Wisk</div>
    <div class="subtitle">Willow & Wisk Café</div>
  </div>

  <div class="settings">📖 Settings</div>

  <div class="shelf">

    <div class="shelf-title">
      Today’s Specials
    </div>

    <div class="grid">

      <button class="btn" onclick="loadStatus()">
        Status
      </button>

      <button class="btn" onclick="loginDiscord()">
        Login
      </button>

      <div class="bowl">🥣</div>

      <button class="btn">
        Activity
      </button>

      <button class="btn">
        Add Discord
      </button>

    </div>

  </div>

  <div class="footer">
    fresh from the kitchen ✨
  </div>

</div>

<script>
function loginDiscord(){
  window.open("/auth/discord");
}

/* temporary */
function loadStatus(){
  alert("status page next");
}
</script>

</body>
</html>
