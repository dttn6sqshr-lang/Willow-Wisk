<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="#">Features</a>
      <a href="#">Dashboard</a>
      <a href="#">Bakery Log</a>
      <a href="#">Status</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Online
    </div>

    <div class="actions">
      <a class="btn ghost" href="/auth/discord">Login</a>
      <a class="btn" href="#">Invite</a>
    </div>

  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="cupcake">🧁</div>
  <h1>Willow Wisk</h1>
  <p class="subtitle">freshly baked systems for your server</p>

  <div class="pills">
    <div>Tickets</div>
    <div>Moderation</div>
    <div>Verification</div>
    <div>Partnerships</div>
  </div>
</section>

<!-- STATS ONLY (NO OTHER SECTIONS) -->
<section class="stats">

  <div class="stat">
    <h2>120+</h2>
    <p>Servers</p>
  </div>

  <div class="stat">
    <h2>43.8K</h2>
    <p>Users</p>
  </div>

  <div class="stat">
    <h2>99.9%</h2>
    <p>Uptime</p>
  </div>

</section>

<footer>
  Willow Wisk • v1.0.0
</footer>

</body>
</html>
