<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Server Dashboard • Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-pill">
    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="/dashboard">Back</a>
      <a href="/bakerylog.html">Bakery Log</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Server Panel
    </div>
  </div>
</div>

<section class="hero">
  <h1 id="serverName">Loading Server...</h1>
  <p class="subtitle">manage modules & settings</p>
</section>

<section class="info-cards">

  <div class="mini-card"> Tickets </div>
  <div class="mini-card"> Moderation</div>
  <div class="mini-card"> Verification</div>
  <div class="mini-card"> Analytics</div>

</section>

<script>
const guildId = localStorage.getItem("selectedGuild");

if (!guildId) {
  window.location.href = "/dashboard";
}

async function loadServer() {
  const res = await fetch("/api/guilds");
  const guilds = await res.json();

  const guild = guilds.find(g => g.id === guildId);

  if (!guild) {
    document.getElementById("serverName").innerText = "Server not found";
    return;
  }

  document.getElementById("serverName").innerText = guild.name;
}

loadServer();
</script>

</body>
</html>
