<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Server Dashboard • Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="/dashboard">Dashboard</a>
      <a href="/bakerylog.html">Bakery Log</a>
      <a href="/status.html">Status</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Connected
    </div>

  </div>
</div>

<section class="server-header">

  <img id="serverIcon" src="" class="big-server-icon">

  <h1 id="serverName">Loading...</h1>

  <p class="subtitle">Manage your server modules</p>

</section>

<section class="module-grid">

  <div class="module-card">🎟 Tickets</div>

  <div class="module-card">🔐 Verification</div>

  <div class="module-card">📜 Logs</div>

  <div class="module-card">🛠 Builder Studio</div>

  <div class="module-card">🛡 Security</div>

  <div class="module-card">⚙ Settings</div>

</section>

<script>
const guildId = localStorage.getItem("selectedGuild");

if (!guildId) {
  window.location.href = "/dashboard";
}

async function loadServer() {
  const res = await fetch("/api/guilds");
  const guilds = await res.json();

  const guild = guilds.find(g => g.id === guildId);

  if (!guild) {
    document.getElementById("serverName").innerText =
      "Server not found";
    return;
  }

  document.getElementById("serverName").innerText =
    guild.name;

  document.getElementById("serverIcon").src =
    guild.icon || "https://via.placeholder.com/100";
}

loadServer();
</script>

</body>
</html>
