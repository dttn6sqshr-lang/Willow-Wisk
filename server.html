<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Server Panel • Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="/home.html">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/bakerylog.html">Bakery Log</a>
      <a href="/status.html">Status</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      Server Panel
    </div>

  </div>
</div>

<section class="hero">
  <h1 id="serverName">Loading...</h1>
  <p class="subtitle">server control panel</p>
</section>

<section class="stats">

  <div class="stat">
    <h2>Tickets</h2>
    <p>Manage system</p>
  </div>

  <div class="stat">
    <h2>Moderation</h2>
    <p>Ban / mute tools</p>
  </div>

  <div class="stat">
    <h2>Settings</h2>
    <p>Bot configuration</p>
  </div>

</section>

<script>
const guildId = localStorage.getItem("selectedGuild");

if (!guildId) {
  document.getElementById("serverName").innerText = "No server selected";
} else {
  fetch("/api/guilds")
    .then(res => res.json())
    .then(guilds => {
      const guild = guilds.find(g => g.id === guildId);
      document.getElementById("serverName").innerText = guild ? guild.name : "Unknown Server";
    });
}
</script>

</body>
</html>
