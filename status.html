<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status • Willow Wisk</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-pill">

    <div class="logo">🥐 ᰔ</div>

    <div class="links">
      <a href="/home.html">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/features.html">Features</a>
      <a href="/bakerylog.html">Bakery Log</a>
    </div>

    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </div>

  </div>
</div>

<section class="hero">
  <h1>System Status</h1>
  <p class="subtitle">live health of Willow Wisk</p>
</section>

<section class="stats">

  <div class="stat">
    <h2 id="servers">0</h2>
    <p>Servers</p>
  </div>

  <div class="stat">
    <h2 id="users">0</h2>
    <p>Users</p>
  </div>

  <div class="stat">
    <h2 id="uptime">0h</h2>
    <p>Uptime</p>
  </div>

</section>

<script>
async function loadStatus() {
  try {
    const res = await fetch("/api/stats");
    const data = await res.json();

    document.getElementById("servers").innerText = data.servers;
    document.getElementById("users").innerText = data.users;

    const uptimeSec = Math.floor((Date.now() - data.uptime) / 1000);
    document.getElementById("uptime").innerText =
      Math.floor(uptimeSec / 3600) + "h";

    document.getElementById("statusDot").style.background = "#4ade80";
    document.getElementById("statusText").innerText = "Online";

  } catch (e) {
    document.getElementById("statusDot").style.background = "red";
    document.getElementById("statusText").innerText = "Offline";
  }
}

loadStatus();
setInterval(loadStatus, 15000);
</script>

</body>
</html>
